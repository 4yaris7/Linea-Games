<!DOCTYPE html>
<html lang="de">
<head>

<title>Meine Mini-Games</title>
<style>
body { font-family: Arial; background: #121212; color: white; text-align: center; }
h1 { margin: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
.game { background: #1e1e1e; padding: 10px; border-radius: 10px; transition: 0.2s; }
.game:hover { background: #333; transform: scale(1.05); }
a { color: white; text-decoration: none; display: block; padding: 10px; }
</style>
</head>
<body>

<h1>🎮 Meine Mini-Games</h1>

<div class="grid">
  <div class="game"><a href="https://playsnake.org/" target="_blank">🐍 Snake</a></div>
  <div class="game"><a href="https://tetris.com/play-tetris" target="_blank">🧱 Tetris</a></div>
  <div class="game"><a href="https://2048game.com/" target="_blank">🔢 2048</a></div>
  <div class="game"><a href="https://chromedino.com/" target="_blank">🦖 Dino</a></div>
  <div class="game"><a href="https://pacman.live/" target="_blank">👻 Pacman</a></div>
  <div class="game"><a href="https://flappybird.io/" target="_blank">🐦 Flappy Bird</a></div>
  <div class="game"><a href="https://slopegame.io/" target="_blank">⛰️ Slope</a></div>
  <div class="game"><a href="https://agar.io/" target="_blank">⚫ Agar.io</a></div>
  <div class="game"><a href="https://krunker.io/" target="_blank">🔫 Krunker</a></div>
  <div class="game"><a href="https://paper-io.com/" target="_blank">🧠 Paper.io</a></div>
</div>

</body>
</html>
